<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电商详情图制作 - AI数字员工</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      text-align: center;
      padding: 40px 0;
    }
    .header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    .header p {
      color: #888;
    }
    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(10px);
    }
    .card h2 {
      font-size: 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #aaa;
      font-size: 14px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #4f46e5;
    }
    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }
    .upload-area {
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover {
      border-color: #4f46e5;
      background: rgba(79,70,229,0.1);
    }
    .upload-area.has-image {
      padding: 10px;
    }
    .upload-area img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 8px;
    }
    .upload-icon {
      font-size: 48px: 10px;
    }
    .btn {
     ;
      margin-bottom padding: 14px 32px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(79,70,229,0.3);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
      margin-top: 10px;
    }
    .preview-area {
      min-height: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .preview-placeholder {
      color: #666;
      text-align: center;
    }
    .preview-placeholder .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    .result-images {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      width: 100%;
    }
    .result-images img {
      width: 100%;
      border-radius: 8px;
      transition: transform 0.3s;
    }
    .result-images img:hover {
      transform: scale(1.05);
    }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .task-info {
      background: rgba(79,70,229,0.2);
      padding: 15px;
      border-radius: 8px;
      width: 100%;
      margin-bottom: 20px;
    }
    .task-info .label {
      color: #aaa;
      font-size: 12px;
    }
    .task-info .value {
      font-family: monospace;
      word-break: break-all;
    }
    .cost {
      text-align: center;
      margin-top: 15px;
      color: #aaa;
    }
    .hidden {
      display: none;
    }
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      z-index: 100;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="window.location.href='/'">← 返回首页</button>

  <div class="container">
    <div class="header">
      <h1>电商详情图制作</h1>
      <p>上传产品照片，AI自动生成电商宣传详情图</p>
    </div>

    <div class="main-content">
      <!-- 左侧：输入表单 -->
      <div class="card">
        <h2>📝 产品信息</h2>

        <div class="form-group">
          <label>上传产品照片 *</label>
          <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <div class="upload-content" id="uploadContent">
              <div class="upload-icon">📷</div>
              <p>点击上传产品图片</p>
              <p style="color:#666;font-size:12px">支持 JPG、PNG 格式</p>
            </div>
          </div>
          <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileUpload(event)">
        </div>

        <div class="form-group">
          <label>产品名称 *</label>
          <input type="text" id="productName" placeholder="例如：iPhone 15 Pro Max">
        </div>

        <div class="form-group">
          <label>产品描述</label>
          <textarea id="productDesc" placeholder="描述产品的特点、材质、功能等..."></textarea>
        </div>

        <div class="form-group">
          <label>所属行业</label>
          <select id="industry">
            <option value="general">通用</option>
            <option value="clothing">服装鞋帽</option>
            <option value="electronics">数码科技</option>
            <option value="beauty">美妆护肤</option>
            <option value="food">食品饮料</option>
            <option value="furniture">家居家装</option>
            <option value="toys">玩具母婴</option>
            <option value="sports">运动户外</option>
          </select>
        </div>

        <div class="form-group">
          <label>图片风格</label>
          <select id="style">
            <option value="professional">专业商业</option>
            <option value="minimalist">简约风格</option>
            <option value="luxury">高端奢华</option>
            <option value="fresh">清新自然</option>
            <option value="fashion">时尚潮流</option>
            <option value="tech">科技感</option>
          </select>
        </div>

        <button class="btn btn-primary" id="generateBtn" onclick="generateImages()">
          开始生成
        </button>

        <div class="cost">
          预计消耗算力：100 算力
        </div>
      </div>

      <!-- 右侧：预览区域 -->
      <div class="card">
        <h2>🖼️ 生成结果</h2>

        <div class="preview-area" id="previewArea">
          <div class="preview-placeholder" id="placeholder">
            <div class="icon">🎨</div>
            <p>上传产品图片并填写信息</p>
            <p style="color:#666;font-size:14px">点击"开始生成"按钮</p>
          </div>

          <div class="loading hidden" id="loading">
            <div class="spinner"></div>
            <p>AI 正在生成电商详情图...</p>
            <p style="color:#666;font-size:14px">请稍候</p>
          </div>

          <div class="task-info hidden" id="taskInfo">
            <div class="label">任务ID:</div>
            <div class="value" id="taskId"></div>
          </div>

          <div class="result-images hidden" id="resultImages"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let uploadedImageBase64 = '';
    let currentRequestId = '';
    let pollInterval = null;

    // 处理文件上传
    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        uploadedImageBase64 = e.target.result;
        const uploadArea = document.getElementById('uploadArea');
        const uploadContent = document.getElementById('uploadContent');
        uploadArea.classList.add('has-image');
        uploadContent.innerHTML = `<img src="${uploadedImageBase64}" alt="产品图片">`;
      };
      reader.readAsDataURL(file);
    }

    // 生成图片
    async function generateImages() {
      const productName = document.getElementById('productName').value.trim();
      const productDesc = document.getElementById('productDesc').value.trim();
      const industry = document.getElementById('industry').value;
      const style = document.getElementById('style').value;

      if (!uploadedImageBase64) {
        alert('请先上传产品图片');
        return;
      }

      if (!productName) {
        alert('请输入产品名称');
        return;
      }

      // 显示加载状态
      document.getElementById('placeholder').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('generateBtn').disabled = true;

      try {
        const response = await fetch('/api/ecommerce/detail/generate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            image_url: uploadedImageBase64,
            product_name: productName,
            product_description: productDesc,
            industry: industry,
            style: style
          })
        });

        const data = await response.json();

        if (data.request_id || data.data?.request_id) {
          currentRequestId = data.request_id || data.data.request_id;
          document.getElementById('taskId').textContent = currentRequestId;
          document.getElementById('taskInfo').classList.remove('hidden');
          document.getElementById('loading').innerHTML = `
            <div class="spinner"></div>
            <p>任务已提交，ID: ${currentRequestId}</p>
            <p style="color:#666;font-size:14px">正在生成中...</p>
          `;

          // 开始轮询结果
          pollResult();
        } else if (data.data?.image_url) {
          // 直接返回图片
          showResults([data.data.image_url]);
        } else if (data.error) {
          alert('生成失败：' + data.error.message);
          resetForm();
        } else {
          console.log('Response:', data);
          alert('生成遇到问题，请查看控制台');
          resetForm();
        }
      } catch (error) {
        console.error('Error:', error);
        alert('生成失败：' + error.message);
        resetForm();
      }
    }

    // 轮询获取结果
    async function pollResult() {
      pollInterval = setInterval(async () => {
        try {
          const response = await fetch(`/api/ecommerce/detail/result?requestId=${currentRequestId}`);
          const data = await response.json();

          if (data.data?.image_url || data.data?.images) {
            clearInterval(pollInterval);
            const images = data.data.images || [data.data.image_url];
            showResults(images);
          } else if (data.error) {
            clearInterval(pollInterval);
            alert('获取结果失败：' + data.error.message);
            resetForm();
          } else if (data.status === 'failed') {
            clearInterval(pollInterval);
            alert('生成失败');
            resetForm();
          }
        } catch (error) {
          console.error('Poll error:', error);
        }
      }, 3000);

      // 最多轮询60次（3分钟）
      setTimeout(() => {
        if (pollInterval) {
          clearInterval(pollInterval);
          if (!document.getElementById('resultImages').classList.contains('hidden')) {
            alert('生成时间较长，请使用任务ID手动查询');
          }
        }
      }, 180000);
    }

    // 显示结果
    function showResults(images) {
      document.getElementById('loading').classList.add('hidden');
      const resultDiv = document.getElementById('resultImages');
      resultDiv.innerHTML = images.map(url => `<img src="${url}" alt="电商详情图">`).join('');
      resultDiv.classList.remove('hidden');
      document.getElementById('generateBtn').disabled = false;
    }

    // 重置表单
    function resetForm() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('generateBtn').disabled = false;
    }
  </script>
</body>
</html>
